<html ng-app="">
<head>
<title>Counter</title>

<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

</head>

<body>

<div ng-init="count=0">

Count : {{count}} <br><br>

<button ng-click="count = count + 1">
Click Here
</button>

</div>

</body>
</html>
